# ─── DataSource ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/rentlens_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=dul.12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────
# 'update' → Hibernate auto-creates / updates tables; never drops existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Server ───────────────────────────────────────────────────────
server.port=8080

# ─── Logging ──────────────────────────────────────────────────────
logging.level.com.rentlens=DEBUG
logging.level.org.hibernate.SQL=DEBUG
